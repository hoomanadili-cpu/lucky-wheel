<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستم چرخ رازآلود - نسخه فقط عکس خالص</title>
    <style>
        body { 
            font-family: Tahoma, sans-serif; 
            background-color: #f1f2f6; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 10px;
            box-sizing: border-box;
        }
        .container { display: flex; background: rgba(25, 25, 25, 0.85); backdrop-filter: blur(8px); color: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); gap: 30px; max-width: 900px; width: 100%; border: 1px solid rgba(255,255,255,0.1); justify-content: center; flex-wrap: wrap; }
        .wheel-area { position: relative; display: flex; justify-content: center; align-items: center; flex: 1; min-width: 280px; max-width: 100%; }
        .control-area { width: 320px; display: flex; flex-direction: column; gap: 12px; max-height: 85vh; overflow-y: auto; padding-left: 5px; min-width: 280px; }
        .hidden { display: none !important; }
        label { font-size: 13px; font-weight: bold; color: #dfe4ea; margin-bottom: -5px; }
        textarea { width: 100%; height: 65px; border: 2px solid #57606f; background: #2f3542; color: white; border-radius: 8px; padding: 10px; box-sizing: border-box; resize: none; font-size: 13px; outline: none; }
        .file-box { display: flex; flex-direction: column; gap: 4px; }
        input[type="file"] { border: 2px dashed #1e90ff; padding: 8px; border-radius: 8px; cursor: pointer; background-color: #2f3542; color: #ced6e0; font-size: 12px; width: 100%; box-sizing: border-box; }
        button { background-color: #1e90ff; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: bold; transition: 0.2s; margin-top: 3px; }
        button:hover { background-color: #3742fa; }
        .download-btn { background-color: #2ed573; }
        .download-btn:hover { background-color: #26af5f; }
        .pointer { position: absolute; top: -5px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #ff4754; z-index: 10; }
        canvas { border-radius: 50%; box-shadow: 0 6px 20px rgba(0,0,0,0.4); border: 6px solid #ffffff; box-sizing: border-box; cursor: pointer; display: block; margin: 0 auto; max-width: 100%; height: auto !important; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75); display: flex; justify-content: center; align-items: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-box { background: white; padding: 30px; border-radius: 16px; text-align: center; max-width: 500px; width: 90%; box-shadow: 0 10px 35px rgba(0,0,0,0.5); transform: scale(0.8); transition: transform 0.3s ease; color: #333; }
        .modal-overlay.active .modal-box { transform: scale(1); }
        .modal-box h2 { margin-top: 0; color: #2ecc71; font-size: 24px; }
        .winner-img-container { margin: 20px 0; display: flex; justify-content: center; }
        .winner-img-container img { width: 100%; max-width: 300px; height: auto; max-height: 300px; border-radius: 16px; object-fit: contain; background: #f8f9fa; border: 4px solid #2ecc71; box-shadow: 0 6px 16px rgba(0,0,0,0.15); }
        .winner-text { font-size: 22px; font-weight: bold; margin-bottom: 20px; color: #2f3542; }
        .close-btn { background-color: #2ecc71; color: white; padding: 12px 25px; border-radius: 8px; border: none; font-size: 16px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div class="wheel-area">
        <div class="pointer"></div>
        <canvas id="wheelCanvas" width="400" height="400"></canvas>
    </div>
    <div class="control-area" id="adminPanel">
        <h2 style="margin: 0 0 5px 0; font-size: 18px; color: #1e90ff;">تنظیمات ادمین (نسخه عکس خالص)</h2>
        <label>۱. عنوان گزینه‌ها (خط به خط):</label>
        <textarea id="namesInput" placeholder="گزینه ۱">آیتم ۱&#10;آیتم ۲&#10;آیتم ۳</textarea>
        <div class="file-box">
            <label>۲. آپلود تصاویر انبوه برنده (پاپ‌آپ):</label>
            <input type="file" id="imageInput" multiple accept="image/*">
        </div>
        <div class="file-box">
            <label>۳. تصویر روی بدنه چرخ (بدون هیچ علامت اضافی):</label>
            <input type="file" id="bgInput" accept="image/*">
        </div>
        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); width: 100%; margin: 5px 0;">
        <button class="download-btn" id="downloadDbBtn">📥 ۱. دانلود فایل دیتابیس چرخ</button>
        <button id="spinBtn">تست چرخاندن 🎡</button>
    </div>
</div>

<div class="modal-overlay" id="winnerModal">
    <div class="modal-box">
        <h2>🎉 برنده انتخاب شد! 🎉</h2>
        <div class="winner-img-container" id="winnerImgContainer"></div>
        <div class="winner-text" id="winnerText">نام برنده</div>
        <button class="close-btn" id="closeModalBtn">عالیه!</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const namesInput = document.getElementById('namesInput');
    const imageInput = document.getElementById('imageInput');
    const bgInput = document.getElementById('bgInput');
    const spinBtn = document.getElementById('spinBtn');
    const downloadDbBtn = document.getElementById('downloadDbBtn');
    const adminPanel = document.getElementById('adminPanel');
    const winnerModal = document.getElementById('winnerModal');
    const winnerImgContainer = document.getElementById('winnerImgContainer');
    const winnerText = document.getElementById('winnerText');
    const closeModalBtn = document.getElementById('closeModalBtn');

    let segments = []; 
    let currentRotation = 0;
    let isSpinning = false;
    let bgDataStr = "";
    let wheelImage = null; 
    const colors = ['#ff4757', '#2ed573', '#2f3542', '#1e90ff', '#ffa502', '#747d8c', '#9b59b6', '#34495e'];

    const urlParams = new URLSearchParams(window.location.search);
    const modeParam = urlParams.get('mode');

    if (modeParam === 'user') {
        adminPanel.classList.add('hidden');
        fetchExternalData();
    } else {
        updateSegmentsFromText();
    }

    bgInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                bgDataStr = event.target.result;
                wheelImage = new Image();
                wheelImage.onload = function() {
                    drawWheel();
                };
                wheelImage.src = bgDataStr;
            };
            reader.readAsDataURL(file);
        }
    });

    function updateSegmentsFromText() {
        const lines = namesInput.value.split('\n').map(line => line.trim()).filter(line => line !== '');
        segments = lines.map((line, index) => ({
            text: line,
            img: (segments[index] && segments[index].img) ? segments[index].img : null,
            imgStr: (segments[index] && segments[index].imgStr) ? segments[index].imgStr : ""
        }));
        if (segments.length === 0) segments = [{ text: 'بدون گزینه', img: null, imgStr: "" }];
        drawWheel();
    }

    imageInput.addEventListener('change', function(e) {
        const files = e.target.files;
        if (files.length === 0) return;
        let loadedCount = 0;
        let tempImages = [];
        let tempStrings = [];

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    tempImages[i] = img;
                    tempStrings[i] = event.target.result;
                    loadedCount++;
                    
                    if (loadedCount === files.length) {
                        const maxItems = Math.max(tempImages.length, segments.length);
                        const newSegments = [];
                        const textLines = [];

                        for (let j = 0; j < maxItems; j++) {
                            let currentText = (segments[j] && segments[j].text) ? segments[j].text : `آیتم ${j + 1}`;
                            newSegments.push({
                                text: currentText,
                                img: tempImages[j] || (segments[j] ? segments[j].img : null),
                                imgStr: tempStrings[j] || (segments[j] ? segments[j].imgStr : "")
                            });
                            textLines.push(currentText);
                        }
                        segments = newSegments;
                        namesInput.value = textLines.join('\n');
                        drawWheel();
                    }
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }
    });

    function drawWheel() {
        const numSegments = segments.length;
        const anglePerSegment = (2 * Math.PI) / numSegments;
        const radius = canvas.width / 2;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.save();
        ctx.translate(radius, radius);
        ctx.rotate(currentRotation);

        if (wheelImage && wheelImage.complete) {
            // برش دایره‌ای تمیز برای عکس روی چرخ
            ctx.beginPath();
            ctx.arc(0, 0, radius - 6, 0, 2 * Math.PI);
            ctx.clip();
            // رسم عکس بدون هیچ ستاره یا نوشته اضافی روی آن
            ctx.drawImage(wheelImage, -radius, -radius, canvas.width, canvas.height);
        } else {
            // حالت پیش‌فرض رنگی (فقط در صورت نبودن عکس)
            for (let i = 0; i < numSegments; i++) {
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, radius - 6, i * anglePerSegment, (i + 1) * anglePerSegment);
                ctx.fillStyle = colors[i % colors.length];
                ctx.fill();
                ctx.lineWidth = 1;
                ctx.strokeStyle = '#ffffff';
                ctx.stroke();
            }
            // رسم ستاره‌ها فقط روی چرخ رنگی پیش‌فرض
            for (let i = 0; i < numSegments; i++) {
                ctx.save();
                ctx.rotate(i * anglePerSegment + anglePerSegment / 2);
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 14px Tahoma';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('★', radius / 1.4, 0); 
                ctx.restore();
            }
        }
        ctx.restore();
    }

    downloadDbBtn.addEventListener('click', () => {
        const exportData = {
            bg: bgDataStr,
            items: segments.map(s => ({ text: s.text, imgStr: s.imgStr }))
        };
        const blob = new Blob([JSON.stringify(exportData)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "data.json";
        a.click();
    });

    function fetchExternalData() {
        fetch('data.json?cb=' + new Date().getTime())
        .then(response => response.json())
        .then(decoded => {
            if (decoded.bg) {
                bgDataStr = decoded.bg;
                wheelImage = new Image();
                wheelImage.onload = function() {
                    drawWheel();
                };
                wheelImage.src = bgDataStr;
            }
            
            let loadedCount = 0;
            const items = decoded.items;
            segments = [];
            const itemsWithImg = items.filter(i => i.imgStr);

            if (itemsWithImg.length === 0) {
                items.forEach((obj, idx) => {
                    segments[idx] = { text: obj.text, img: null, imgStr: "" };
                });
                drawWheel();
                return;
            }

            items.forEach((item, index) => {
                if (item.imgStr) {
                    const img = new Image();
                    img.onload = function() {
                        segments[index] = { text: item.text, img: img, imgStr: item.imgStr };
                        loadedCount++;
                        if (loadedCount === itemsWithImg.length) {
                            items.forEach((obj, idx) => {
                                if (!segments[idx]) segments[idx] = { text: obj.text, img: null, imgStr: "" };
                            });
                            drawWheel();
                        }
                    };
                    img.src = item.imgStr;
                } else {
                    if (!segments[index]) segments[index] = { text: item.text, img: null, imgStr: "" };
                }
            });
        })
        .catch(err => {
            alert("خطا: فایل data.json پیدا نشد.");
        });
    }

    function showWinnerModal(winnerItem) {
        winnerText.textContent = winnerItem.text;
        winnerImgContainer.innerHTML = '';
        if (winnerItem.img) {
            const newImg = document.createElement('img');
            newImg.src = winnerItem.img.src;
            winnerImgContainer.appendChild(newImg);
        } else {
            winnerImgContainer.innerHTML = '<span style="font-size: 70px;">🏆</span>';
        }
        winnerModal.classList.add('active');
    }

    closeModalBtn.addEventListener('click', () => winnerModal.classList.remove('active'));
    canvas.addEventListener('click', spin);
    spinBtn.addEventListener('click', spin);

    function spin() {
        if (isSpinning || segments.length === 0) return;
        isSpinning = true;

        const spinDuration = 5000;
        const startTimestamp = performance.now();
        const startRotation = currentRotation;
        const targetRotation = startRotation + (Math.random() * 5 + 7) * 2 * Math.PI;

        function animate(timestamp) {
            const elapsed = timestamp - startTimestamp;
            const progress = Math.min(elapsed / spinDuration, 1);
            const easeOut = 1 - Math.pow(1 - progress, 4);
            
            currentRotation = startRotation + (targetRotation - startRotation) * easeOut;
            drawWheel();

            if (progress < 1) {
                requestAnimationFrame(animate);
            } else {
                isSpinning = false;
                const numSegments = segments.length;
                const anglePerSegment = (2 * Math.PI) / numSegments;
                let normalizedRotation = (3 * Math.PI / 2 - currentRotation) % (2 * Math.PI);
                if (normalizedRotation < 0) normalizedRotation += 2 * Math.PI;
                const winningIndex = Math.floor(normalizedRotation / anglePerSegment) % numSegments;
                showWinnerModal(segments[winningIndex]);
            }
        }
        requestAnimationFrame(animate);
    }
    namesInput.addEventListener('input', updateSegmentsFromText);
</script>

</body>
</html>
